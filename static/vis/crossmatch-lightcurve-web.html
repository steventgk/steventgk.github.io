<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gaia + VIRAC Light Curves</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #151b23;
      --plot: #0f1620;
      --line: #334155;
      --grid: #3f4f63;
      --text: #e6edf3;
      --muted: #9aa8ba;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    .lc-viewer {
      display: grid;
      grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
      min-height: 100vh;
    }
    .controls {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 12px;
      overflow: auto;
    }
    .plots {
      padding: 12px;
      overflow: auto;
    }
    input[type="search"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0f1620;
      color: var(--text);
      font: inherit;
    }
    input[type="search"] {
      padding: 8px 9px;
      margin-bottom: 8px;
    }
    select {
      height: 220px;
      padding: 5px;
    }
    option {
      padding: 3px 5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .group {
      border-top: 1px solid var(--line);
      margin-top: 12px;
      padding-top: 12px;
    }
    .group-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .02em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .band-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    label {
      align-items: center;
      display: flex;
      gap: 7px;
      min-width: 0;
    }
    input[type="checkbox"] {
      accent-color: var(--accent);
      margin: 0;
    }
    .stack {
      display: grid;
      gap: 8px;
    }
    .source-summary {
      color: var(--muted);
      display: grid;
      gap: 4px;
      line-height: 1.35;
    }
    .plot {
      background: var(--plot);
      border: 1px solid var(--line);
      border-radius: 6px;
      min-height: 360px;
    }
    #time-plots {
      display: grid;
      grid-template-columns: repeat(2, minmax(320px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    #phase-plot {
      min-height: 420px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 5px 4px;
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2) {
      text-align: left;
    }
    th {
      color: var(--muted);
      font-weight: 700;
    }
    .empty {
      align-items: center;
      color: var(--muted);
      display: flex;
      min-height: 180px;
      justify-content: center;
    }
    @media (max-width: 900px) {
      .lc-viewer { grid-template-columns: 1fr; }
      .controls { border-right: 0; border-bottom: 1px solid var(--line); }
      #time-plots { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="lc-viewer" id="lc-viewer">
    <aside class="controls">
      <input class="source-search" type="search" placeholder="Search Gaia or VIRAC source ID">
      <select class="source-select" size="12"></select>

      <section class="group">
        <div class="group-title">Bands</div>
        <div class="band-grid"></div>
      </section>

      <section class="group stack">
        <label><input class="show-flagged" type="checkbox"> Show flagged/rejected points</label>
        <label><input class="stats-use-flagged" type="checkbox"> Include flagged/rejected in std</label>
        <label><input class="double-phase" type="checkbox" checked> Show phase twice</label>
        <label><input class="offset-mean" type="checkbox"> Phase plot as offset from mean</label>
      </section>

      <section class="group">
        <div class="group-title">Selected Source</div>
        <div class="source-summary"></div>
      </section>

      <section class="group">
        <div class="group-title">Band Scatter</div>
        <table class="stats-table"></table>
      </section>

      <section class="group">
        <div class="group-title">Std-dev Ratios</div>
        <table class="ratio-table"></table>
      </section>
    </aside>

    <main class="plots">
      <div id="phase-plot" class="plot"></div>
      <div id="time-plots"></div>
    </main>
  </div>

  <script>
  (() => {
    const root = document.getElementById("lc-viewer");
    const data = JSON.parse(document.getElementById("lc-data").textContent);
    const ratioPairs = JSON.parse(document.getElementById("ratio-pairs").textContent);
    const $ = (selector) => root.querySelector(selector);
    const bandOrder = data.bandOrder;
    const bandStyles = data.bandStyles;

    const sourceSearch = $(".source-search");
    const sourceSelect = $(".source-select");
    const bandGrid = $(".band-grid");
    const showFlagged = $(".show-flagged");
    const statsUseFlagged = $(".stats-use-flagged");
    const doublePhase = $(".double-phase");
    const offsetMean = $(".offset-mean");
    const sourceSummary = $(".source-summary");
    const statsTable = $(".stats-table");
    const ratioTable = $(".ratio-table");
    const phasePlot = $("#phase-plot");
    const timePlots = $("#time-plots");

    const plotConfig = {
      responsive: true,
      displaylogo: false,
      modeBarButtonsToRemove: ["lasso2d", "select2d"]
    };
    const plotTheme = {
      paper_bgcolor: "#0f1620",
      plot_bgcolor: "#0f1620",
      font: { color: "#e6edf3" },
      title: { font: { color: "#e6edf3" } },
      xaxis: {
        color: "#cbd5e1",
        gridcolor: "#4b5f78",
        linecolor: "#5f728a",
        zerolinecolor: "#657894"
      },
      yaxis: {
        color: "#cbd5e1",
        gridcolor: "#4b5f78",
        linecolor: "#5f728a",
        zerolinecolor: "#657894"
      },
      legend: { font: { color: "#e6edf3" } }
    };

    function makeBandControls() {
      bandGrid.innerHTML = bandOrder.map((band) => {
        const color = bandStyles[band].color;
        return `<label><input type="checkbox" class="band-check" data-band="${band}" checked>
          <span style="color:${color};font-weight:700">${band}</span></label>`;
      }).join("");
    }

    function selectedBands(source) {
      const checked = [...root.querySelectorAll(".band-check:checked")].map((el) => el.dataset.band);
      return checked.filter((band) => source.bands[band] && source.bands[band].time.length);
    }

    function currentSource() {
      const index = Number(sourceSelect.value || 0);
      return data.sources[index] || data.sources[0];
    }

    function populateSources() {
      const query = sourceSearch.value.trim().toLowerCase();
      const previous = sourceSelect.value;
      sourceSelect.innerHTML = "";
      data.sources.forEach((source, index) => {
        const label = `Gaia ${source.gaia_id} | VIRAC ${source.virac_id}`;
        if (query && !label.toLowerCase().includes(query)) return;
        const option = document.createElement("option");
        option.value = String(index);
        option.textContent = label;
        sourceSelect.appendChild(option);
      });
      if ([...sourceSelect.options].some((option) => option.value === previous)) {
        sourceSelect.value = previous;
      } else if (sourceSelect.options.length) {
        sourceSelect.selectedIndex = 0;
      }
      render();
    }

    function finite(values) {
      return values.filter((value) => Number.isFinite(value));
    }

    function mean(values) {
      const clean = finite(values);
      if (!clean.length) return NaN;
      return clean.reduce((total, value) => total + value, 0) / clean.length;
    }

    function std(values) {
      const clean = finite(values);
      if (clean.length < 2) return NaN;
      const avg = mean(clean);
      const variance = clean.reduce((total, value) => total + (value - avg) ** 2, 0) / (clean.length - 1);
      return Math.sqrt(variance);
    }

    function format(value, digits = 5) {
      return Number.isFinite(value) ? value.toFixed(digits) : "";
    }

    function pointMask(band, includeFlagged) {
      return band.mag.map((_, index) => includeFlagged || !band.flagged[index]);
    }

    function valuesForStats(band) {
      const includeFlagged = statsUseFlagged.checked;
      return band.mag.filter((_, index) => includeFlagged || !band.flagged[index]);
    }

    function phaseMean(band) {
      const unflagged = band.mag.filter((_, index) => !band.flagged[index]);
      return mean(unflagged.length ? unflagged : band.mag);
    }

    function foldedPhase(time, frequency) {
      const raw = (time * frequency) % 1;
      return raw < 0 ? raw + 1 : raw;
    }

    function duplicateIfNeeded(x, y) {
      if (!doublePhase.checked) return [x, y];
      return [x.concat(x.map((value) => value + 1)), y.concat(y)];
    }

    function markerTrace(source, bandLabel, mask, symbol, showLegend, offsetFromMeanValue) {
      const band = source.bands[bandLabel];
      const style = bandStyles[bandLabel];
      const x = [];
      const y = [];
      const meanMag = phaseMean(band);
      for (let i = 0; i < band.time.length; i += 1) {
        if (!mask[i]) continue;
        x.push(foldedPhase(band.time[i], source.frequency));
        y.push(offsetFromMeanValue ? band.mag[i] - meanMag : band.mag[i]);
      }
      const doubled = duplicateIfNeeded(x, y);
      return {
        x: doubled[0],
        y: doubled[1],
        name: bandLabel,
        type: "scattergl",
        mode: "markers",
        showlegend: showLegend,
        marker: {
          color: style.color,
          size: symbol === "x" ? 9 : 7,
          symbol,
          line: { color: style.color, width: 1 }
        }
      };
    }

    function renderSummary(source) {
      sourceSummary.innerHTML = `
        <div>Gaia ${source.gaia_id}</div>
        <div>VIRAC ${source.virac_id}</div>
        <div>frequency = ${format(source.frequency, 8)} day^-1</div>
        <div>period = ${format(source.period, 8)} days</div>
      `;
    }

    function renderPhase(source, bands) {
      if (!Number.isFinite(source.frequency) || source.frequency <= 0) {
        phasePlot.innerHTML = '<div class="empty">No valid Gaia frequency available</div>';
        return;
      }
      const traces = [];
      bands.forEach((bandLabel) => {
        const band = source.bands[bandLabel];
        const goodMask = pointMask(band, false);
        traces.push(markerTrace(source, bandLabel, goodMask, "circle", true, offsetMean.checked));
        if (showFlagged.checked) {
          const flaggedMask = band.flagged.map(Boolean);
          traces.push(markerTrace(source, bandLabel, flaggedMask, "x", false, offsetMean.checked));
        }
      });
      const yTitle = offsetMean.checked ? "mag - band mean" : "Magnitude";
      Plotly.react(phasePlot, traces, {
        ...plotTheme,
        title: { text: offsetMean.checked ? "Phase-folded light curves, offset from band means" : "Phase-folded light curves", x: 0.03 },
        margin: { l: 58, r: 16, t: 48, b: 48 },
        xaxis: { ...plotTheme.xaxis, title: "Phase", zeroline: false, showgrid: true },
        yaxis: { ...plotTheme.yaxis, title: yTitle, autorange: "reversed", zeroline: false, showgrid: true },
        legend: { orientation: "h", x: 0, y: 1.12 },
      }, plotConfig);
    }

    function renderTimePlots(source, bands) {
      timePlots.innerHTML = "";
      if (!bands.length) {
        timePlots.innerHTML = '<div class="plot empty">No selected bands have light-curve data</div>';
        return;
      }
      bands.forEach((bandLabel) => {
        const band = source.bands[bandLabel];
        const style = bandStyles[bandLabel];
        const plot = document.createElement("div");
        plot.className = "plot";
        timePlots.appendChild(plot);
        const goodX = [];
        const goodY = [];
        const flaggedX = [];
        const flaggedY = [];
        band.time.forEach((time, index) => {
          if (band.flagged[index]) {
            flaggedX.push(time);
            flaggedY.push(band.mag[index]);
          } else {
            goodX.push(time);
            goodY.push(band.mag[index]);
          }
        });
        const traces = [{
          x: goodX,
          y: goodY,
          type: "scattergl",
          mode: "markers",
          name: bandLabel,
          marker: { color: style.color, size: 7 }
        }];
        if (showFlagged.checked) {
          traces.push({
            x: flaggedX,
            y: flaggedY,
            type: "scattergl",
            mode: "markers",
            name: `${bandLabel} flagged`,
            marker: { color: style.color, size: 9, symbol: "x" },
            showlegend: false
          });
        }
        Plotly.newPlot(plot, traces, {
          ...plotTheme,
          title: { text: `${style.survey} ${bandLabel}`, x: 0.04 },
          margin: { l: 58, r: 14, t: 44, b: 46 },
          xaxis: { ...plotTheme.xaxis, title: "MJD", zeroline: false, showgrid: true },
          yaxis: { ...plotTheme.yaxis, title: "Magnitude", autorange: "reversed", zeroline: false, showgrid: true },
          showlegend: false
        }, plotConfig);
      });
    }

    function renderStats(source, bands) {
      const stats = {};
      const rows = bands.map((bandLabel) => {
        const band = source.bands[bandLabel];
        const values = valuesForStats(band);
        const bandMean = mean(values);
        const bandStd = std(values);
        stats[bandLabel] = bandStd;
        const flaggedCount = band.flagged.filter(Boolean).length;
        return `<tr>
          <td>${bandLabel}</td>
          <td>${bandStyles[bandLabel].survey}</td>
          <td>${values.length}</td>
          <td>${flaggedCount}</td>
          <td>${format(bandMean)}</td>
          <td>${format(bandStd)}</td>
        </tr>`;
      });
      statsTable.innerHTML = `<thead><tr>
        <th>Band</th><th>Survey</th><th>N used</th><th>N flagged</th><th>Mean mag</th><th>Std mag</th>
      </tr></thead><tbody>${rows.join("")}</tbody>`;
      return stats;
    }

    function renderRatios(stats, bands) {
      const selected = new Set(bands);
      const rows = ratioPairs
        .filter(([a, b]) => selected.has(a) && selected.has(b))
        .map(([a, b]) => {
          const ratio = stats[a] / stats[b];
          if (!Number.isFinite(ratio) || stats[b] <= 0) return "";
          return `<tr><td>${a}/${b}</td><td>${format(ratio, 4)}</td></tr>`;
        })
        .filter(Boolean);
      ratioTable.innerHTML = `<thead><tr><th>Ratio</th><th>Value</th></tr></thead><tbody>${rows.join("")}</tbody>`;
    }

    function render() {
      const source = currentSource();
      if (!source) return;
      const bands = selectedBands(source);
      renderSummary(source);
      renderPhase(source, bands);
      renderTimePlots(source, bands);
      const stats = renderStats(source, bands);
      renderRatios(stats, bands);
    }

    makeBandControls();
    populateSources();
    sourceSearch.addEventListener("input", populateSources);
    sourceSelect.addEventListener("change", render);
    root.addEventListener("change", (event) => {
      if (event.target.matches("input")) render();
    });
    window.addEventListener("resize", () => {
      Plotly.Plots.resize(phasePlot);
      [...timePlots.querySelectorAll(".plot")].forEach((plot) => Plotly.Plots.resize(plot));
    });
  })();
  </script>
</body>
</html>
